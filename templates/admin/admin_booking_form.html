{% extends 'admin/admin_base.html' %}
{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center" style="background-image: url('{{ url_for('static', filename='Villa From Outside1.jpg') }}'); background-size: cover; background-position: center; background-attachment: fixed;">
  <div class="relative z-10 w-full max-w-3xl bg-white/30 dark:bg-gray-900/50 rounded-3xl shadow-2xl p-8 mb-8 backdrop-blur-lg border border-yellow-100 dark:border-yellow-900/50 mt-12 transition-colors duration-300">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-3xl font-extrabold text-yellow-400 dark:text-yellow-300 tracking-wide" style="font-family: 'Playfair Display', serif; letter-spacing: 2px;">{{ 'Edit' if booking else 'Create New' }} Booking</h2>
      
      <a href="{{ url_for('admin_bookings') }}" class="px-4 py-2 bg-white/80 dark:bg-gray-800 text-yellow-700 dark:text-yellow-300 rounded-lg hover:bg-white dark:hover:bg-gray-700 transition-all duration-300 flex items-center shadow-md">
        <i class="fas fa-arrow-left mr-2"></i> Back to Bookings
      </a>
    </div>
    
    <div class="bg-white/60 dark:bg-gray-800/60 rounded-xl p-6 shadow-md transition-colors duration-300">
      <form method="POST" class="space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <!-- User Selection -->
        <div class="space-y-2">
          <label for="user_id" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Select User</label>
          <select id="user_id" name="user_id" required class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 dark:focus:ring-yellow-500 transition-colors duration-300">
            <option value="" disabled {% if not booking %}selected{% endif %}>-- Select a user --</option>
            {% for user in users %}
            <option value="{{ user.id }}" {% if booking and booking.user_id == user.id %}selected{% endif %}>{{ user.username }} ({{ user.email }})</option>
            {% endfor %}
          </select>
        </div>
        
        <!-- Date Range -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label for="check_in" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Check-in Date</label>
            <input type="date" id="check_in" name="check_in" required 
                   value="{{ booking.check_in.strftime('%Y-%m-%d') if booking else '' }}" 
                   min="{{ today }}" 
                   class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 dark:focus:ring-yellow-500 transition-colors duration-300">
          </div>
          <div class="space-y-2">
            <label for="check_out" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Check-out Date</label>
            <input type="date" id="check_out" name="check_out" required 
                   value="{{ booking.check_out.strftime('%Y-%m-%d') if booking else '' }}" 
                   min="{{ today }}" 
                   class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 dark:focus:ring-yellow-500 transition-colors duration-300">
          </div>
        </div>
        
        <!-- Guests and Price -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-2">
            <label for="guests" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Number of Guests</label>
            <input type="number" id="guests" name="guests" required min="1" max="10" 
                   value="{{ booking.guests if booking else '2' }}" 
                   class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 dark:focus:ring-yellow-500 transition-colors duration-300">
          </div>
          <div class="space-y-2">
            <label for="total_price" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Total Price (₹)</label>
            <input type="number" id="total_price" name="total_price" required min="1000" step="100" 
                   value="{{ booking.total_price if booking else '10000' }}" 
                   class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 dark:focus:ring-yellow-500 transition-colors duration-300">
          </div>
        </div>
        
        <!-- Status -->
        <div class="space-y-2">
          <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Booking Status</label>
          <select id="status" name="status" required class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 dark:focus:ring-yellow-500 transition-colors duration-300">
            <option value="pending" {% if booking and booking.status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="confirmed" {% if booking and booking.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
            <option value="cancelled" {% if booking and booking.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          </select>
        </div>
        
        <!-- Special Requests -->
        <div class="space-y-2">
          <label for="special_requests" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Special Requests</label>
          <textarea id="special_requests" name="special_requests" rows="4" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 dark:bg-gray-700 dark:text-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 dark:focus:ring-yellow-500 transition-colors duration-300">{{ booking.special_requests if booking else '' }}</textarea>
        </div>
        
        <!-- Submit Button -->
        <div class="flex justify-end">
          <button type="submit" class="px-6 py-3 bg-yellow-500 dark:bg-yellow-600 text-white rounded-lg hover:bg-yellow-600 dark:hover:bg-yellow-700 transition-all duration-300 flex items-center shadow-md">
            <i class="fas fa-save mr-2"></i> {{ 'Update' if booking else 'Create' }} Booking
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  // Date validation
  const checkInInput = document.getElementById('check_in');
  const checkOutInput = document.getElementById('check_out');
  
  checkInInput.addEventListener('change', function() {
    // Set minimum check-out date to be the check-in date
    checkOutInput.min = this.value;
    
    // If check-out date is before new check-in date, update it
    if (checkOutInput.value && checkOutInput.value < this.value) {
      checkOutInput.value = this.value;
    }
  });
  
  // Price calculation (simplified example)
  const guestsInput = document.getElementById('guests');
  const priceInput = document.getElementById('total_price');
  const basePrice = 10000; // Base price per night
  
  function updatePrice() {
    const checkIn = new Date(checkInInput.value);
    const checkOut = new Date(checkOutInput.value);
    
    if (checkIn && checkOut && checkIn <= checkOut) {
      // Calculate number of nights
      const nights = Math.ceil((checkOut - checkIn) / (1000 * 60 * 60 * 24));
      
      // Calculate price based on nights and guests
      const guests = parseInt(guestsInput.value) || 2;
      const guestFactor = guests > 2 ? (guests - 2) * 1000 : 0; // Extra charge for additional guests
      
      const totalPrice = (basePrice * nights) + guestFactor;
      priceInput.value = totalPrice;
    }
  }
  
  // Update price when inputs change
  checkInInput.addEventListener('change', updatePrice);
  checkOutInput.addEventListener('change', updatePrice);
  guestsInput.addEventListener('change', updatePrice);
</script>
{% endblock %}
