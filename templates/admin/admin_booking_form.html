{% extends 'admin/admin_base.html' %}
{% block content %}
<div class="p-6 sm:p-10 bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div class="flex items-center">
                <div class="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-4 rounded-2xl shadow-xl mr-6">
                    <i class="fas fa-{{ 'edit' if booking else 'plus' }} text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-black text-gray-900 dark:text-white tracking-tight">{{ 'Edit' if booking else 'Create' }} Booking</h1>
                    <p class="text-gray-500 dark:text-gray-400 font-medium">{{ 'Modify an existing booking' if booking else 'Add a manual booking to the system' }}</p>
                </div>
            </div>
            <a href="{{ url_for('admin_bookings') }}" class="inline-flex items-center px-6 py-3 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 font-bold rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-gray-50 transition-all shadow-sm">
                <i class="fas fa-arrow-left mr-2"></i> Back to Bookings
            </a>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-[2.5rem] shadow-sm border border-gray-100 dark:border-gray-700 p-8 md:p-10">
            <form method="POST" class="space-y-8">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <!-- Guest Selection -->
                <div class="space-y-4">
                    <label for="user_id" class="text-sm font-black text-gray-400 uppercase tracking-widest ml-1">Guest Selection</label>
                    <div class="relative group">
                        <select id="user_id" name="user_id" required class="w-full bg-gray-50 dark:bg-gray-900 border-2 border-gray-50 dark:border-gray-900 rounded-2xl px-6 py-4 font-bold text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="" disabled {% if not booking %}selected{% endif %}>-- Select a registered user --</option>
                            {% for user in users %}
                            <option value="{{ user.id }}" {% if booking and booking.user_id == user.id %}selected{% endif %}>{{ user.username }} ({{ user.email }})</option>
                            {% endfor %}
                        </select>
                        <i class="fas fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 group-hover:text-blue-500 transition-colors pointer-events-none"></i>
                    </div>
                </div>
                
                <!-- Dates -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label for="check_in" class="text-sm font-black text-gray-400 uppercase tracking-widest ml-1">Check-in Date</label>
                        <input type="date" id="check_in" name="check_in" required 
                               value="{{ booking.check_in.strftime('%Y-%m-%d') if booking else '' }}" 
                               class="w-full bg-gray-50 dark:bg-gray-900 border-2 border-gray-50 dark:border-gray-900 rounded-2xl px-6 py-4 font-bold text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>
                    <div class="space-y-4">
                        <label for="check_out" class="text-sm font-black text-gray-400 uppercase tracking-widest ml-1">Check-out Date</label>
                        <input type="date" id="check_out" name="check_out" required 
                               value="{{ booking.check_out.strftime('%Y-%m-%d') if booking else '' }}" 
                               class="w-full bg-gray-50 dark:bg-gray-900 border-2 border-gray-50 dark:border-gray-900 rounded-2xl px-6 py-4 font-bold text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                    </div>
                </div>
                
                <!-- Details -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <label for="guests" class="text-sm font-black text-gray-400 uppercase tracking-widest ml-1">Total Guests</label>
                        <div class="relative">
                            <i class="fas fa-users absolute left-6 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="number" id="guests" name="guests" required min="1" max="15" 
                                   value="{{ booking.guests if booking else '2' }}" 
                                   class="w-full bg-gray-50 dark:bg-gray-900 border-2 border-gray-50 dark:border-gray-900 rounded-2xl pl-14 pr-6 py-4 font-bold text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <label for="total_price" class="text-sm font-black text-gray-400 uppercase tracking-widest ml-1">Total Price (₹)</label>
                        <div class="relative">
                            <i class="fas fa-rupee-sign absolute left-6 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="number" id="total_price" name="total_price" required min="1000" step="100" 
                                   value="{{ booking.total_price if booking else '10000' }}" 
                                   class="w-full bg-gray-50 dark:bg-gray-900 border-2 border-gray-50 dark:border-gray-900 rounded-2xl pl-14 pr-6 py-4 font-bold text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:bg-white transition-all">
                        </div>
                    </div>
                </div>
                
                <!-- Status -->
                <div class="space-y-4">
                    <label for="status" class="text-sm font-black text-gray-400 uppercase tracking-widest ml-1">Booking Status</label>
                    <div class="relative group">
                        <select id="status" name="status" required class="w-full bg-gray-50 dark:bg-gray-900 border-2 border-gray-50 dark:border-gray-900 rounded-2xl px-6 py-4 font-bold text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="pending" {% if booking and booking.status == 'pending' %}selected{% endif %}>Pending</option>
                            <option value="confirmed" {% if booking and booking.status == 'confirmed' %}selected{% endif %}>Confirmed</option>
                            <option value="cancelled" {% if booking and booking.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 group-hover:text-blue-500 transition-colors pointer-events-none"></i>
                    </div>
                </div>
                
                <!-- Special Requests -->
                <div class="space-y-4">
                    <label for="special_requests" class="text-sm font-black text-gray-400 uppercase tracking-widest ml-1">Special Requests</label>
                    <textarea id="special_requests" name="special_requests" rows="4" class="w-full bg-gray-50 dark:bg-gray-900 border-2 border-gray-50 dark:border-gray-900 rounded-2xl px-6 py-4 font-bold text-gray-900 dark:text-white focus:outline-none focus:border-blue-500 focus:bg-white transition-all placeholder-gray-400" placeholder="Enter any special notes or requests here...">{{ booking.special_requests if booking else '' }}</textarea>
                </div>
                
                <!-- Submit Button -->
                <div class="pt-6">
                    <button type="submit" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl transition-all transform hover:-translate-y-1 shadow-xl shadow-blue-100 dark:shadow-none flex items-center justify-center gap-3">
                        <i class="fas fa-save text-lg"></i> 
                        {{ 'Update' if booking else 'Save' }} Booking Information
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
