{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto py-16 flex flex-col items-center">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">
    <h2 class="text-2xl font-bold mb-4 text-green-600">Reset Password</h2>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="password" name="password" placeholder="New password" required class="w-full px-4 py-2 rounded-lg border border-gray-300 mb-4">
      <input type="password" name="confirm_password" placeholder="Confirm new password" required class="w-full px-4 py-2 rounded-lg border border-gray-300 mb-4">
      <button type="submit" class="w-full py-2 rounded-lg bg-green-500 hover:bg-green-600 text-white font-bold">Reset Password</button>
    </form>
  </div>
</div>
{% endblock %}
