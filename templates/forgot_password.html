{% extends 'base.html' %}
{% block content %}
<div class="container mx-auto py-16 flex flex-col items-center">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">
    <h2 class="text-2xl font-bold mb-4 text-blue-600">Forgot Password</h2>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="email" name="email" placeholder="Enter your email" required class="w-full px-4 py-2 rounded-lg border border-gray-300 mb-4">
      <button type="submit" class="w-full py-2 rounded-lg bg-blue-500 hover:bg-blue-600 text-white font-bold">Send Reset Link</button>
    </form>
    {% if reset_url %}
      <div class="mt-6 p-4 bg-blue-100 rounded text-blue-800">
        <strong>Reset Link (for testing):</strong><br>
        <a href="{{ reset_url }}" class="break-all text-blue-700 underline">{{ reset_url }}</a>
      </div>
    {% endif %}
  </div>
</div>
{% endblock %}
